apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ziamalik174/campus-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        # Note: You should add your DB and Qdrant secrets here if you want them in K8s
        # For now, it will use the default values or you can add them manually.
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8000
